<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | ACCESS DENIED</title>

    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        accent: '#06b6d4',
                        dark: '#0f172a',
                    },
                    animation: {
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
            color: #e2e8f0;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Effet de scanline old school */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(6, 182, 212, 0.1) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 10s linear infinite;
            pointer-events: none;
        }

        @keyframes scanline {
            0% {
                bottom: 100%;
            }

            100% {
                bottom: -100%;
            }
        }
    </style>
</head>

<body class="h-screen flex items-center justify-center relative">

    <div class="scanline"></div>

    <div class="text-center px-6 relative z-20">
        <h1
            class="text-9xl font-bold font-mono text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-primary mb-4 animate-pulse-fast">
            404
        </h1>

        <h2 class="text-2xl md:text-3xl font-bold text-white mb-6">
            <i class="ri-alarm-warning-line text-red-500 mr-2"></i>
            RESSOURCE INTROUVABLE
        </h2>

        <div id="terminal-logs"
            class="bg-dark/50 border border-white/10 rounded-lg p-6 max-w-lg mx-auto mb-10 text-left font-mono text-sm shadow-2xl backdrop-blur-sm min-h-[160px]">
            <p class="text-gray-500 animate-pulse mt-2" id="cursor">_</p>
        </div>

        <a href="/"
            class="inline-flex items-center px-8 py-4 rounded-xl bg-white/5 border border-white/10 hover:bg-primary/20 hover:border-primary/50 transition duration-300 group">
            <i class="ri-arrow-left-line mr-2 group-hover:-translate-x-1 transition"></i>
            <span class="font-mono font-bold">RETOUR_BASE</span>
        </a>
    </div>

    <script>
        const terminalLogs = document.getElementById('terminal-logs');
        const cursor = document.getElementById('cursor');

        // Sécurisation contre l'injection XSS (Cross-Site Scripting)
        function secureHTML(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
        const safePath = secureHTML(window.location.pathname || "/");

        const lines = [
            { text: "> INITIATING SEARCH PROTOCOL...", class: "text-green-500" },
            { text: `> TARGET: <span class="text-white">${safePath}</span>`, class: "text-gray-400" },
            { text: "> ERROR: TARGET_NOT_FOUND", class: "text-red-500" },
            { text: "> STATUS: CONNECTION_TERMINATED", class: "text-red-500" }
        ];

        let lineIndex = 0;

        function typeLine() {
            if (lineIndex < lines.length) {
                const p = document.createElement('p');
                p.className = lines[lineIndex].class;
                p.innerHTML = lines[lineIndex].text;
                terminalLogs.insertBefore(p, cursor);
                lineIndex++;
                setTimeout(typeLine, Math.random() * 200 + 200);
            } else {
                fetchIP();
            }
        }

        setTimeout(typeLine, 500);

        function fetchIP() {
            fetch('https://api.ipify.org?format=json')
                .then(response => response.json())
                .then(data => {
                    const ipLog = document.createElement('p');
                    ipLog.className = "text-accent mt-2";
                    ipLog.innerHTML = `> CLIENT_IP_DETECTED: <span class="text-white">${secureHTML(data.ip)}</span>`;
                    terminalLogs.insertBefore(ipLog, cursor);
                })
                .catch(err => {
                    const errLog = document.createElement('p');
                    errLog.className = "text-yellow-500 mt-2";
                    errLog.innerHTML = `> CLIENT_IP_DETECTED: <span class="text-gray-500">[HIDDEN / UNAVAILABLE]</span>`;
                    terminalLogs.insertBefore(errLog, cursor);
                });
        }
    </script>
</body>

</html>
