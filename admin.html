<!DOCTYPE html>
<html lang="fr"
    class="bg-gray-900 text-white font-mono h-screen flex items-center justify-center relative overflow-hidden">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Panel | Restricted Access</title>
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        accent: '#06b6d4',
                        dark: '#0f172a',
                    }
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">

    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .font-sans {
            font-family: 'Outfit', sans-serif;
        }
    </style>

    <script>
        console.log("Hint: Le mot de passe est le nom du protocole de routage à état de lien standard...");
        // Réponse : ospf
    </script>
</head>

<body>
    <canvas id="particles-canvas" class="fixed inset-0 z-0 pointer-events-none opacity-40"></canvas>
    <div
        class="relative z-10 w-full max-w-md p-8 bg-gray-800/50 border border-red-500/30 rounded-lg backdrop-blur-md shadow-2xl shadow-red-900/20">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-red-500 mb-2 flex justify-center items-center gap-2">
                <i class="ri-alarm-warning-line"></i> ⚠ ACCÈS RESTREINT
            </h1>
            <p class="text-gray-400 text-sm">Authentification biométrique requise ou Override manuel.</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs text-gray-500 mb-1 uppercase tracking-wider">Identifiant</label>
                <input type="text" value="root" disabled
                    class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-gray-400 cursor-not-allowed font-mono">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1 uppercase tracking-wider">Password Override</label>
                <input type="password" id="pass"
                    class="w-full bg-gray-900 border border-red-500/50 rounded p-2 text-white focus:outline-none focus:border-red-500 transition font-mono placeholder-gray-600"
                    placeholder="Entrez le code d'accès...">
            </div>
            <button onclick="checkPass()"
                class="w-full py-3 bg-red-500/10 hover:bg-red-500/20 border border-red-500/50 text-red-500 rounded transition font-bold tracking-wider uppercase">
                Initialiser la connexion
            </button>
            <p id="msg" class="text-center text-xs h-4 mt-2 text-red-400 font-bold"></p>
        </div>

        <div class="mt-6 pt-6 border-t border-gray-700 text-center">
            <a href="/" class="text-xs text-gray-500 hover:text-white transition no-underline hover:underline">
                &lt; Retour Interface Publique
            </a>
        </div>
    </div>

    <div id="success-modal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title"
        role="dialog" aria-modal="true">
        <div class="fixed inset-0 bg-gray-900/80 backdrop-blur-sm transition-opacity opacity-0" id="modal-backdrop">
        </div>

        <div class="flex min-h-screen items-end justify-center p-4 text-center sm:items-center sm:p-0">
            <div class="relative transform overflow-hidden rounded-2xl bg-gray-800/50 border border-green-500/50 backdrop-blur-md text-left shadow-2xl shadow-green-900/20 transition-all sm:my-8 sm:w-full sm:max-w-lg opacity-0 scale-95"
                id="modal-panel">
                <div class="px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div class="sm:flex sm:items-start">
                        <div
                            class="mx-auto flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full bg-green-500/10 sm:mx-0 sm:h-10 sm:w-10">
                            <i class="ri-flag-2-fill text-2xl text-green-500"></i>
                        </div>
                        <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left">
                            <h3 class="text-xl font-bold leading-6 text-white" id="modal-title">
                                Bien joué !
                            </h3>
                            <div class="mt-2">
                                <p class="text-sm text-gray-300">
                                    Vous avez trouvé l'accès admin caché. <br>
                                    <span class="font-mono text-green-400 font-bold">(Flag validé 🏳️)</span>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-800/50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6">
                    <button type="button" onclick="closeModalAndRedirect()"
                        class="inline-flex w-full justify-center rounded-xl bg-green-600 px-5 py-2.5 text-sm font-bold text-white shadow-sm hover:bg-green-500 sm:ml-3 sm:w-auto transition-all">
                        OK, retour à l'accueil
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Permet de valider avec la touche Entrée
        document.getElementById("pass").addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                checkPass();
            }
        });

        // --- Fonctions de la Modale ---
        const modal = document.getElementById('success-modal');
        const backdrop = document.getElementById('modal-backdrop');
        const panel = document.getElementById('modal-panel');

        function openModal() {
            modal.classList.remove('hidden');
            // Animation d'apparition
            setTimeout(() => {
                backdrop.classList.remove('opacity-0');
                panel.classList.remove('opacity-0', 'scale-95');
                panel.classList.add('opacity-100', 'scale-100');
            }, 10);
        }

        function closeModalAndRedirect() {
            // Animation de disparition
            backdrop.classList.add('opacity-0');
            panel.classList.remove('opacity-100', 'scale-100');
            panel.classList.add('opacity-0', 'scale-95');

            // Attendre la fin de l'animation avant de rediriger
            setTimeout(() => {
                modal.classList.add('hidden');
                window.location.href = "/";
            }, 300);
        }
        // ---------------------------

        async function checkPass() {
            const p = document.getElementById('pass').value.toLowerCase();
            const msg = document.getElementById('msg');

            // Sécurité : Vérification par Hash SHA-256 au lieu de texte brut
            const msgBuffer = new TextEncoder().encode(p);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            // Hash "ospf"
            const targetHash = '9592fdb01fa917dfa7ed8f1b13dddc71a4f00dbff28bdf6ea07ab7336ed06ef7';

            if (hashHex === targetHash) {
                msg.style.color = '#4ade80'; // Vert
                msg.innerText = "ACCÈS AUTORISÉ.";

                // On ouvre la nouvelle modale stylisée au lieu de l'alerte moche
                openModal();

            } else {
                msg.style.color = '#f87171'; // Rouge
                msg.innerText = "ERREUR : MOT DE PASSE INCORRECT.";

                const input = document.querySelector('input[type="password"]');
                input.classList.add('animate-bounce');
                setTimeout(() => input.classList.remove('animate-bounce'), 500);

                document.getElementById('pass').value = '';
            }
        }

        // --- Particles JS ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let w, h;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2;
                this.alpha = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0) this.x = w;
                if (this.x > w) this.x = 0;
                if (this.y < 0) this.y = h;
                if (this.y > h) this.y = 0;
            }
            draw() {
                ctx.fillStyle = `rgba(148, 163, 184, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 50; i++) {
            particles.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, w, h);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(148, 163, 184, ${0.1 * (1 - dist / 100)})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
    </script>
</body>

</html>
